<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UaTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubbish - 投稿系统</title>
    <style>
        /* 清除默认边距，让页面占满屏幕 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出现双重滚动条 */
            background-color: #f7f9fc; /* 友好的浅色背景 */
        }
        
        /* 备用地址的样式，放在页面最底层居中 */
        .fallback-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            z-index: 1; /* 处于底层 */
            width: 90%;
        }

        .fallback-container a {
            color: #1677ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            word-break: break-all;
        }

        .fallback-container a:hover {
            text-decoration: underline;
        }

        /* 设置 iframe 样式为全屏，并置于上层 */
        #doc-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10; /* 处于上层，加载成功后会遮住底部的文字 */
            background-color: transparent; /* 允许透明，失败时可见底层 */
        }
    </style>
</head>
<body>

    <!-- 备用链接提示层（默认在 iframe 底部，加载失败时可见） -->
    <div class="fallback-container">
        <p>页面似乎没有成功加载，请点击下方备用投稿地址：</p>
        <a href="https://365.kdocs.cn/l/cbn49QEWZccZ" target="_blank">https://365.kdocs.cn/l/cbn49QEWZccZ</a>
    </div>

    <!-- 嵌入金山文档链接 -->
    <iframe 
        id="doc-frame"
        src="https://365.kdocs.cn/l/cbn49QEWZccZ" 
        allowfullscreen="true" 
        webkitallowfullscreen="true" 
        mozallowfullscreen="true">
        <!-- 针对极少数不支持 iframe 标签的旧版浏览器显示 -->
        您的浏览器不支持 iframe，请直接访问备用投稿地址：<a href="https://365.kdocs.cn/l/cbn49QEWZccZ" target="_blank">点击这里</a>
    </iframe>

</body>
</html>
